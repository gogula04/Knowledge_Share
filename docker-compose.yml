services:
  db:
    image: pgvector/pgvector:pg15
    container_name: fms-knowledge-db
    environment:
      POSTGRES_DB: fms_knowledge
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d fms_knowledge"]
      interval: 10s
      timeout: 5s
      retries: 10

  web:
    build: .
    container_name: fms-knowledge-web
    command: npm run dev
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/fms_knowledge
      APP_URL: http://localhost:3000
      JWT_SECRET: dev-secret-change-me-dev-secret-change-me
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      STORAGE_DIR: uploads
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - web_node_modules:/app/node_modules
      - uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy

  worker:
    build: .
    container_name: fms-knowledge-worker
    command: npm run worker
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/fms_knowledge
      JWT_SECRET: dev-secret-change-me-dev-secret-change-me
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      STORAGE_DIR: uploads
    volumes:
      - .:/app
      - web_node_modules:/app/node_modules
      - uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
  web_node_modules:
  uploads:

